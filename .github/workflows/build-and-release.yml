name: Build and Release Driver

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Clojure Tools
        uses: DeLaGuardo/setup-clojure@13.6.0
        with:
          cli: latest

      - name: Restore Clojure dependencies cache
        id: cache-clojure
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: ${{ runner.os }}-clojure-${{ hashFiles('deps.edn', 'metabase/deps.edn') }}
          restore-keys: |
            ${{ runner.os }}-clojure-

      - name: Run Linting
        run: make lint

      - name: Run Static Analysis
        run: make splint

        - name: Save Clojure dependencies cache
        if: always() && steps.cache-clojure.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: ${{ steps.cache-clojure.outputs.cache-primary-key }}

  tests:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: 'recursive'
      
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Clojure Tools
        uses: DeLaGuardo/setup-clojure@13.6.0
        with:
          cli: latest

      - name: Restore Clojure dependencies cache
        id: cache-clojure
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: ${{ runner.os }}-clojure-${{ hashFiles('deps.edn', 'metabase/deps.edn') }}
          restore-keys: |
            ${{ runner.os }}-clojure-

      - name: Run Tests
        run: make test
      
      - name: Run Coverage
        run: make coverage

  build:
    name: Build Driver
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: 'recursive'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Create target directory
        run: mkdir -p target

      - name: Build driver with Docker
        run: make docker-build-driver

      - name: Upload driver artifact
        uses: actions/upload-artifact@v7
        with:
          name: sparql-driver
          path: target/sparql.metabase-driver.jar
          if-no-files-found: error
  
  release:
    name: Release Driver
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: 'recursive'

      - name: Download driver artifact
        uses: actions/download-artifact@v8
        with:
          name: sparql-driver
          path: target

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create $TAG \
            --title="Metabase SPARQL Driver ${TAG#v}" \
            --generate-notes \
            'target/sparql.metabase-driver.jar#sparql.metabase-driver.jar'
    
  build-and-push-docker-image:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs: release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: 'recursive'

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=Metabase + SPARQL Driver
            org.opencontainers.image.licenses=AGPL-3.0-only
